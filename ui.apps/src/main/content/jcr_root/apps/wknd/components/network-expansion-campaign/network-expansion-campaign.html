<!--/* Network Expansion Campaign Component */-->
<div data-sly-use.model="com.adobe.aem.guides.wknd.core.models.NetworkExpansionCampaign"
     data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html"
     data-sly-test.hasContent="${!model.empty}"
     data-analytics-id="${model.analyticsId}"
     class="cmp-network-expansion-campaign"
     role="article">
    
    <!-- Image Section (conditional) -->
    <div data-sly-test="${model.hasImage}" class="cmp-network-expansion-campaign__image">
        <img src="${model.image}" 
             alt="${model.imageAltText}" 
             class="cmp-network-expansion-campaign__image-img"/>
    </div>
    
    <!-- Content Section -->
    <div class="cmp-network-expansion-campaign__content">
        
        <!-- Headline -->
        <h2 class="cmp-network-expansion-campaign__headline">${model.headline}</h2>
        
        <!-- Description (conditional) -->
        <p data-sly-test="${model.description}" 
           class="cmp-network-expansion-campaign__description">
            ${model.description}
        </p>
        
        <!-- Status Badge -->
        <span class="cmp-network-expansion-campaign__badge ${model.statusBadgeClass}" 
              role="status"
              aria-label="Deployment Status: ${model.deploymentStatus}">
            ${model.deploymentStatus}
        </span>
        
        <!-- Launch Date -->
        <p class="cmp-network-expansion-campaign__launch-date">
            <strong>Launch:</strong> ${model.launchDate}
        </p>
        
        <!-- Service Area -->
        <p class="cmp-network-expansion-campaign__service-area">
            <strong>Service Area:</strong> ${model.serviceArea}
        </p>
        
        <!-- CTA Button -->
        <a href="${model.ctaUrl}" 
           class="cmp-network-expansion-campaign__cta"
           role="button"
           aria-label="${model.ctaText}: ${model.headline}">
            ${model.ctaText}
        </a>
    </div>
</div>

<!-- Placeholder for empty component -->
<sly data-sly-call="${placeholderTemplate.placeholder @ isEmpty=!hasContent}"></sly>
